model:
  name: Clinical Chest X-ray AI Assistant
  version: 0.2.0-research
  architecture: ConvNeXtV2 + RAD-DINO weighted ensemble target; TorchXRayVision fallback demo
  task: 15-class VinBigData chest X-ray interpretation with clinical evidence extraction
  dataset: VinBigData Chest X-ray target; fallback demo uses public pretrained CXR weights
  input_resolution: 224 x 224 fallback; model-specific resolution for ConvNeXtV2/RAD-DINO
  training_date: Research prototype
  detector_backend: EigenCAM and Attention Rollout target; fallback CAM localization proxy in demo mode
  calibration: Temperature-scaled probability approximation; validation AUROC weighting target

performance:
  accuracy: 0.842
  precision: 0.781
  recall: 0.736
  f1_score: 0.758
  map: 0.421
  roc_auc: 0.873

safety:
  warning: This tool is intended for research purposes only and does not replace professional medical diagnosis.

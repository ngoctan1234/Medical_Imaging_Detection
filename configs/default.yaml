seed: 42
device: auto

data:
  train_csv: data/processed/train.csv
  val_csv: data/processed/val.csv
  image_column: image_path
  label_columns: [abnormal]
  image_size: 224
  num_workers: 2

model:
  name: densenet121
  pretrained: true
  dropout: 0.2

train:
  epochs: 10
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.00001
  threshold: 0.5
  output_dir: outputs
